<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Graphics Part – Axel Cormon</title>

<style>
/* Intégration de la police */
@font-face {
    font-family: "CafeFrancoise";
    src: url("fonts/CafeFrancoise.woff2") format("woff2");
    font-weight: normal;
    font-style: normal;
}

html, body {
    cursor: none !important;
    margin: 0;
    padding: 0;
    background: ivory;
    font-family: Arial, sans-serif;
    /* On cache le curseur classique de la souris sur toute la page */
    cursor: none; 
}

#cursor {
    position: fixed;
    width: 32px;
    height: 32px;
    background-image: url('https://i.imgur.com/8FCKZAi.png');
    background-size: contain;
    background-repeat: no-repeat;
    pointer-events: none;
    z-index: 9999999;
    transform: translate(-50%, -50%);
    filter: invert(1);
    mix-blend-mode: difference;
}

/* Supprime TOUS les curseurs natifs */
*,
*::before,
*::after {
    cursor: none !important;
}

/* --- LE CONTENEUR CRUCIAL --- */
.relative-container {
    position: relative;
    width: 100%;
}

.page-image {
    width: 100%;
    height: auto;
    display: block;
}

/* --- LE LIEN FLUIDE --- */
.projets-link {
    position: absolute;
    right: 12.4%;
    top: 76.3%; 
    font-size: 5vw; 
    font-weight: 700;
    text-decoration: none;
    font-family: "CafeFrancoise", cursive;
    rotate: 7.75deg;
    scale: 1;
    letter-spacing: 0.12em; 
    scale: 1.15;

    /* État par défaut */
    color: transparent;
    -webkit-text-stroke: 0.02em #000000; 
    
    /* Dégradé de tracé */
    background: linear-gradient(to right, 
        transparent 0%, 
        #ff0836 100%, 
        #ff0836 100%, 
        transparent 0%, 
        transparent 0%
    );
    background-size: 200% 100%;
    -webkit-background-clip: text;
    background-clip: text;

    /* Animation */
    animation: outlineSweep 3s infinite linear;

    /* Transition */
    transition: 
        scale 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275),
        translate 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275),
        letter-spacing 0.3s ease,
        text-shadow 0.3s ease;
}

@keyframes outlineSweep {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
}

/* --- EFFET HOVER LIEN --- */
.projets-link:hover {
    animation: none; 
    background: none;
    -webkit-background-clip: initial;
    background-clip: initial;
    
    scale: 1.15;
    translate: 0 -0.1em; 
    letter-spacing: 0.12em; 
    
    color: transparent;
    -webkit-text-stroke: 0.03em black; 
    text-shadow: 0.08em 0.08em 0px #ff0836; 
}

/* --- BLOCAGE MOBILE & TABLETTE --- */
#mobile-blocker {
    display: none; /* Caché par défaut */
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: ivory; /* Même couleur que ton fond */
    z-index: 1000000; /* Au-dessus de tout, même du curseur */
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 20px;
    box-sizing: border-box;
}

.blocker-content {
    max-width: 500px;
}

.blocker-logo {
    width: 150px;
    margin-bottom: 30px;
    filter: grayscale(1);
}

#mobile-blocker h1 {
    font-family: 'Inter', sans-serif;
    font-weight: 900;
    letter-spacing: 2px;
    font-size: 1.5rem;
    margin-bottom: 20px;
    color: #000;
}

#mobile-blocker p {
    font-family: 'Inter', sans-serif;
    line-height: 1.6;
    color: #333;
    margin-bottom: 15px;
}

.blocker-content .small {
    font-size: 0.85rem;
    opacity: 0.6;
}

.device-icon {
    font-size: 3rem;
    margin-top: 30px;
    animation: pulse-attention 2s infinite ease-in-out;
}

/* MÉDIA QUERY : Active le blocage si l'écran est petit OU si c'est un appareil tactile sans souris */
@media (max-width: 1024px), (pointer: coarse) {
    #mobile-blocker {
        display: flex; /* On l'affiche */
    }
    
    body, html {
        overflow: hidden !important; /* On empêche tout scroll derrière */
    }
    
    #cursor {
        display: none !important; /* On cache ton curseur custom sur mobile */
    }
}

</style>
</head>

<body>
<div id="mobile-blocker">
    <div class="blocker-content">
        <img src="https://i.imgur.com/Ns30AYK.png" alt="Logo" class="blocker-logo">
        <h1>EXPÉRIENCE NON SUPPORTÉE</h1>
        <p>Ce portfolio utilise des technologies avancées et une navigation interactive conçue exclusivement pour <strong>ordinateur</strong>.</p>
        <p class="small">Pour un confort de lecture optimal et profiter des performances visuelles, merci d'y accéder via un ordinateur.</p>
        <div class="device-icon">💻</div>
    </div>
</div>

<div class="relative-container">
    <img src="https://i.imgur.com/6aCD1kN.jpeg" class="page-image" alt="Graphics page">
    <a href="projects.html" class="projets-link">Projets</a>
</div>

<div id="cursor"></div>

<script>
document.addEventListener("DOMContentLoaded", function () {
    const cursor = document.getElementById("cursor");

    document.addEventListener("mousemove", function(e) {
        cursor.style.left = e.clientX + "px";
        cursor.style.top = e.clientY + "px";
    });
});
</script>

</body>
</html>
