<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Graphics Part – Axel Cormon</title>

<style>
/* Intégration de la police */
@font-face {
    font-family: "CafeFrancoise";
    src: url("fonts/CafeFrancoise.woff2") format("woff2");
    font-weight: normal;
    font-style: normal;
}

html, body {
    margin: 0;
    padding: 0;
    background: ivory;
    font-family: Arial, sans-serif;
}

/* 1. LE CONTENEUR CRUCIAL */
.relative-container {
    position: relative;
    width: 100%;
}

.page-image {
    width: 100%;
    height: auto;
    display: block;
}

/* 2. LE LIEN FLUIDE */
.projets-link {
    position: absolute;
    right: 12.4%;
    
    /* ⚠️ ATTENTION : J'ai remplacé 350% par 80%. 
       Avec le nouveau conteneur, 100% correspond au tout bas de l'image. 
       Ajuste ce pourcentage (ex: 75%, 82%...) pour le placer pile où tu veux ! */
    top: 76.3%; 
    
    /* La taille du texte s'adapte à la largeur de l'écran (5vw = 5% de l'écran) */
    font-size: 5vw; 
    
    font-weight: 700;
    text-decoration: none;
    font-family: "CafeFrancoise", cursive;
    rotate: 7.75deg;
    scale: 1;

    /* Utilisation de "em" pour que l'espacement s'adapte à la taille du texte */
    letter-spacing: 0.12em; 
    scale: 1.15;

    /* État par défaut : Texte transparent avec contour animé */
    color: transparent;
    -webkit-text-stroke: 0.02em #000000; /* Remplace les 1.5px */
    
    /* Dégradé qui sert de "trait" mobile */
    background: linear-gradient(to right, 
        transparent 0%, 
        #ff0836 100%, 
        #ff0836 100%, 
        transparent 0%, 
        transparent 0%
    );
    background-size: 200% 100%;
    -webkit-background-clip: text;
    background-clip: text;

    /* Animation du trait en continu */
    animation: outlineSweep 3s infinite linear;

    /* Transition fluide pour le hover */
    transition: 
        scale 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275),
        translate 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275),
        letter-spacing 0.3s ease,
        text-shadow 0.3s ease;
}

/* Animation du trait qui parcourt les lettres */
@keyframes outlineSweep {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
}

/* --- EFFET HOVER --- */
.projets-link:hover {
    animation: none; /* Stop le parcours du trait */
    background: none;
    -webkit-background-clip: initial;
    background-clip: initial;
    
    scale: 1.15;
    translate: 0 -0.1em; /* Remplace les -5px par du relatif */
    letter-spacing: 0.12em; /* Remplace les 8px */
    
    color: transparent;
    -webkit-text-stroke: 0.03em black; /* Remplace les 2px */
    text-shadow: 0.08em 0.08em 0px #ff0836; /* Remplace les 6px 6px (ombre néo-brutaliste) */
}

</style>
</head>

<body>

<div class="relative-container">
    <img src="https://i.imgur.com/1gp3aFe.jpeg" class="page-image" alt="Graphics page">
    <a href="projets.html" class="projets-link">Projets</a>
</div>

</body>
</html>
