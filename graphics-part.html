<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Graphics Part – Axel Cormon</title>

<style>
/* Intégration de la police */
@font-face {
    font-family: "CafeFrancoise";
    src: url("fonts/CafeFrancoise.woff2") format("woff2");
    font-weight: normal;
    font-style: normal;
}

html, body {
    cursor: none !important;
    margin: 0;
    padding: 0;
    background: ivory;
    font-family: Arial, sans-serif;
    /* On cache le curseur classique de la souris sur toute la page */
    cursor: none; 
}

#cursor {
    position: fixed;
    width: 32px;
    height: 32px;
    background-image: url('https://i.imgur.com/8FCKZAi.png');
    background-size: contain;
    background-repeat: no-repeat;
    pointer-events: none;
    z-index: 9999999;
    transform: translate(-50%, -50%);
    filter: invert(1);
    mix-blend-mode: difference;
}

/* Supprime TOUS les curseurs natifs */
*,
*::before,
*::after {
    cursor: none !important;
}

/* --- LE CONTENEUR CRUCIAL --- */
.relative-container {
    position: relative;
    width: 100%;
}

.page-image {
    width: 100%;
    height: auto;
    display: block;
}

/* --- LE LIEN FLUIDE --- */
.projets-link {
    position: absolute;
    right: 12.4%;
    top: 76.3%; 
    font-size: 5vw; 
    font-weight: 700;
    text-decoration: none;
    font-family: "CafeFrancoise", cursive;
    rotate: 7.75deg;
    scale: 1;
    letter-spacing: 0.12em; 
    scale: 1.15;

    /* État par défaut */
    color: transparent;
    -webkit-text-stroke: 0.02em #000000; 
    
    /* Dégradé de tracé */
    background: linear-gradient(to right, 
        transparent 0%, 
        #ff0836 100%, 
        #ff0836 100%, 
        transparent 0%, 
        transparent 0%
    );
    background-size: 200% 100%;
    -webkit-background-clip: text;
    background-clip: text;

    /* Animation */
    animation: outlineSweep 3s infinite linear;

    /* Transition */
    transition: 
        scale 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275),
        translate 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275),
        letter-spacing 0.3s ease,
        text-shadow 0.3s ease;
}

@keyframes outlineSweep {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
}

/* --- EFFET HOVER LIEN --- */
.projets-link:hover {
    animation: none; 
    background: none;
    -webkit-background-clip: initial;
    background-clip: initial;
    
    scale: 1.15;
    translate: 0 -0.1em; 
    letter-spacing: 0.12em; 
    
    color: transparent;
    -webkit-text-stroke: 0.03em black; 
    text-shadow: 0.08em 0.08em 0px #ff0836; 
}

</style>
</head>

<body>

<div class="relative-container">
    <img src="https://i.imgur.com/1gp3aFe.jpeg" class="page-image" alt="Graphics page">
    <a href="projets.html" class="projets-link">Projets</a>
</div>

<div id="cursor"></div>

<script>
document.addEventListener("DOMContentLoaded", function () {
    const cursor = document.getElementById("cursor");

    document.addEventListener("mousemove", function(e) {
        cursor.style.left = e.clientX + "px";
        cursor.style.top = e.clientY + "px";
    });
});
</script>

</body>
</html>
